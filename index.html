<!DOCTYPE html>
<html>
<head>
<title>Weather Travel Planner</title>

<style>

body{
font-family: Arial;
text-align:center;
margin:0;

/* Background */
background-image: linear-gradient(rgba(0,0,0,0.5),rgba(0,0,0,0.5)),
url("https://images.unsplash.com/photo-1501785888041-af3ef285b470");
background-size: cover;
background-position: center;
background-attachment: fixed;
color:white;
}

h1{
margin-top:30px;
}

/* Weather Buttons */
label.weather{
padding:10px 15px;
background:#4CAF50;
color:white;
margin:5px;
cursor:pointer;
border-radius:5px;
display:inline-block;
}

input[type="radio"]{
display:none;
}

.destinations{
display:none;
margin-top:20px;
}

/* Destination Cards */
.card{
background:white;
color:black;
display:inline-block;
margin:15px;
padding:10px;
border-radius:10px;
box-shadow:0 0 10px gray;
width:220px;
}

.card img{
width:100%;
height:130px;
border-radius:8px;
}

/* Show section when selected */

#sunny:checked ~ .sunnyPlaces{
display:block;
}

#rainy:checked ~ .rainyPlaces{
display:block;
}

#snowy:checked ~ .snowyPlaces{
display:block;
}

/* Booking Form */

.form-container{
background:white;
color:black;
width:350px;
margin:40px auto;
padding:20px;
border-radius:10px;
box-shadow:0 0 10px gray;
}

.form-container input,
.form-container select{
width:90%;
padding:8px;
margin:8px 0;
}

.form-container button{
padding:10px;
background:#4CAF50;
color:white;
border:none;
cursor:pointer;
border-radius:5px;
}

</style>
</head>

<body>

<h1>Weather Based Travel Destinations 🌍</h1>

<p>Select Weather</p>

<input type="radio" id="sunny" name="weather">
<label class="weather" for="sunny">Sunny</label>

<input type="radio" id="rainy" name="weather">
<label class="weather" for="rainy">Rainy</label>

<input type="radio" id="snowy" name="weather">
<label class="weather" for="snowy">Snowy</label>


<!-- Sunny Destinations -->
<div class="destinations sunnyPlaces">

<div class="card">
<a href="goa.html">
<img src="https://images.unsplash.com/photo-1507525428034-b723cf961d3e?auto=format&fit=crop&w=800&q=80">
</a>
<h3>Goa</h3>
</div>

<div class="card">
<a href="bali.html">
<img src="https://images.unsplash.com/photo-1506744038136-46273834b3fb?auto=format&fit=crop&w=800&q=80">
</a>
<h3>Bali</h3>
</div>

<div class="card">
<a href="maldives.html">
<img src="https://images.unsplash.com/photo-1493558103817-58b2924bce98?auto=format&fit=crop&w=800&q=80">
</a>
<h3>Maldives</h3>
</div>

</div>


<!-- Rainy Destinations -->
<div class="destinations rainyPlaces">

<div class="card">
<a href="kerala.html">
<img src="https://images.unsplash.com/photo-1593693397690-362cb9666fc2?auto=format&fit=crop&w=800&q=80">
</a>
<h3>Kerala</h3>
</div>

<div class="card">
<a href="cherrapunji.html">
<img src="https://images.unsplash.com/photo-1501785888041-af3ef285b470?auto=format&fit=crop&w=800&q=80">
</a>
<h3>Cherrapunji</h3>
</div>

<div class="card">
<a href="ubud.html">
<img src="https://images.unsplash.com/photo-1500534314209-a25ddb2bd429?auto=format&fit=crop&w=800&q=80">
</a>
<h3>Ubud (Bali)</h3>
</div>

</div>


<!-- Snowy Destinations -->
<div class="destinations snowyPlaces">

  <div class="card">
<a href="switzerland.html">
    <img src="https://d3hne3c382ip58.cloudfront.net/files/uploads/bookmundi/resized/cmsfeatured/winter-in-switzerland-final-1681881755-785X440.jpg?width=1536&quality=75" alt="Switzerland snow">
</a>
    <h3>Switzerland</h3>
  </div>

  <div class="card">
<a href="manali.html">
    <img src="https://images.unsplash.com/photo-1609947017136-9daf32a5eb16?auto=format&fit=crop&w=800&q=80" alt="Manali Snow">
</a>
    <h3>Manali</h3>
  </div>

  <div class="card">
<a href="lapland.html">
    <img src="https://images.unsplash.com/photo-1519681393784-d120267933ba?auto=format&fit=crop&w=800&q=80" alt="Lapland Snow">
</a>
    <h3>Lapland</h3>
  </div>

</div>
</div>


<!-- Booking Form -->

<div class="form-container">

<h2>Travel Booking Form</h2>

<form>

<input type="text" placeholder="Your Name" required>

<br>

<input type="email" placeholder="Your Email" required>

<br>

<select required>
<option value="">Select Destination</option>
<option>Goa</option>
<option>Bali</option>
<option>Maldives</option>
<option>Kerala</option>
<option>Cherrapunji</option>
<option>Ubud</option>
<option>Switzerland</option>
<option>Manali</option>
<option>Lapland</option>
</select>

<br>

<input type="number" placeholder="Number of Days" min="1">

<br>

<select>
<option>Number of Travelers</option>
<option>1</option>
<option>2</option>
<option>3</option>
<option>4+</option>
</select>

<br>

<input type="date">

<br><br>

<button type="submit">Submit Booking</button>

</form>

</div>

</body>
</html>
